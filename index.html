<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>復古遊戲字典</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,"Noto Sans TC",system-ui,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{text-align:center;max-width:900px}
h1{font-size:clamp(36px,6vw,56px);margin-bottom:8px;background:linear-gradient(135deg,#fff 30%,#2f81f7 100%);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-1px;font-weight:700}
.sub{color:#8b949e;margin-bottom:48px;font-size:15px}
.consoles{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.console{display:block;padding:32px 28px;background:#161b22;border:1px solid #30363d;border-radius:14px;color:inherit;text-decoration:none;transition:all .2s;text-align:left}
.console:hover{border-color:#2f81f7;transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.5)}
.console-icon{font-size:32px;margin-bottom:12px}
.console-name{font-size:18px;font-weight:600;margin-bottom:4px}
.console-meta{color:#8b949e;font-size:13px}
footer{margin-top:60px;color:#6e7681;font-size:13px}
footer a{color:#58a6ff;text-decoration:none}
footer a:hover{text-decoration:underline}
</style>
</head><body><div class="wrap">
<h1>復古遊戲字典</h1>
<p class="sub">Retro Game Dictionary · 中文化版</p>
<div class="consoles">
<a class="console" href="/pce/">
<div class="console-icon">🎮</div>
<div class="console-name">PC Engine</div>
<div class="console-meta">727 款 · 含截圖 / YouTube / 評論</div>
</a>
<a class="console" href="/gba/">
<div class="console-icon">📱</div>
<div class="console-name">Game Boy Advance</div>
<div class="console-meta">2,746 款 · 78% 中文化</div>
</a>
</div>
<footer>更多主機陸續加入 · <a href="https://github.com/bigtaffy/retrogame-dictionary">GitHub</a></footer>
</div></body></html>
