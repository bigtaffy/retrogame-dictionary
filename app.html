        ${g.overview_zh ? `<div class="desc"><span class="desc-label">中</span>${escapeHtml(g.overview_zh)}</div>` : ''}
        ${g.overview_en ? `
          <details class="desc-collapsible">
            <summary class="desc-summary"><span class="desc-label">EN</span>顯示英文原文</summary>
            <div class="desc desc-en-body">${escapeHtml(g.overview_en)}</div>
          </details>` : ''}
        ${g.wiki_extract_en ? `
          <details class="desc-collapsible">
            <summary class="desc-summary"><span class="desc-label">WIKI</span>Wikipedia 補充：${escapeHtml(g.wiki_title || '')}</summary>
            <div class="desc desc-en-body">${escapeHtml(g.wiki_extract_en)}
              ${g.wiki_title ? `<div style="margin-top:10px"><a href="https://en.wikipedia.org/wiki/${encodeURIComponent(g.wiki_title.replace(/ /g, '_'))}" target="_blank" rel="noopener" style="color:var(--cyan);font-size:12px;">↗ 在 Wikipedia 開啟完整條目</a></div>` : ''}
            </div>
          </details>` : ''}
      </div>` : ''}

      ${(g.comment_zh || g.comment_en) ? `
      <div class="section">
        <div class="section-title">✦ Review</div>
        ${g.comment_zh ? `<div class="desc"><span class="desc-label">中</span>${escapeHtml(g.comment_zh)}</div>` : ''}
        ${g.comment_en ? `
          <details class="desc-collapsible">
            <summary class="desc-summary"><span class="desc-label">EN</span>顯示英文原文</summary>
            <div class="desc desc-en-body">${escapeHtml(g.comment_en)}</div>
          </details>` : ''}
      </div>` : ''}

      ${shots.length ? `
      <div class="section">
        <div class="section-title">▦ Screenshots</div>
        <div class="gallery">
          ${shots.slice(0, 12).map(s => { const u = s.url || s; return `<img src="${escapeHtml(proxyImg(u, 480))}" alt="" loading="lazy" decoding="async" data-shot="${escapeHtml(u)}">`; }).join('')}
        </div>
      </div>` : ''}

      ${yts.length ? `
      <div class="section">
        <div class="section-title">▶ Videos</div>
        <div class="videos">
          ${yts.slice(0, 6).map(v => {
            // YouTube entries can be: plain string ID, full URL, or object {id|url, title}
            let vid = '';
            let title = '';
            if (typeof v === 'string') {
              vid = /^[\w-]{11}$/.test(v) ? v : (v.match(/(?:v=|\/)([\w-]{11})/)?.[1] || '');
            } else if (v && typeof v === 'object') {
              vid = v.id || v.videoId || (v.url || '').match(/(?:v=|\/)([\w-]{11})/)?.[1] || '';
              title = v.title || '';
            }
            const thumb = vid ? `https://img.youtube.com/vi/${vid}/hqdefault.jpg` : '';
            return `<div class="video-thumb" style="background-image:url('${thumb}')" data-yt="${escapeHtml(vid)}">
              ${title ? `<div class="v-title">${escapeHtml(title)}</div>` : ''}
            </div>`;
          }).join('')}
        </div>
      </div>` : ''}
    </div>
  `;

  document.getElementById('detail-back').addEventListener('click', () => navigate(consoleName));
  // ▶ 試玩 → 啟動 EmulatorJS
  c.querySelectorAll('.action-btn.play').forEach(btn => {
    btn.addEventListener('click', () => {
      openEmulator(btn.dataset.romUrl, btn.dataset.romConsole, btn.dataset.romTitle);
    });
  });
  c.querySelectorAll('.gallery img').forEach(img => {
    img.addEventListener('click', () => openLightbox(`<img src="${img.dataset.shot}">`));
  });
  c.querySelectorAll('.video-thumb').forEach(t => {
    t.addEventListener('click', () => {
      const vid = t.dataset.yt;
      if (!vid) return;
      openLightbox(`<iframe src="https://www.youtube.com/embed/${vid}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`);
    });
  });
}

/* ============================================================
   LIGHTBOX
   ============================================================ */
function openLightbox(html) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightbox-content').innerHTML = html;
  lb.classList.add('show');
}
document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target.id === 'lightbox') closeLightbox();
});
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
  document.getElementById('lightbox-content').innerHTML = '';
}

/* ============================================================
   RANDOM GAME
   ============================================================ */
function randomGame() {
  const data = state.cache.get(state.console);
  if (!data || !data.games.length) return;
  const g = data.games[Math.floor(Math.random() * data.games.length)];
  navigate(`${state.console}/g/${g.id}`);
}

/* ============================================================
   DISCOVER VIEW
   ============================================================ */
async function renderDiscover() {
  const c = document.getElementById('view-container');
  showLoading('Loading discover...');
  await loadConsole(state.console);
  const data = state.cache.get(state.console);
  if (!data) return;

  // Random 12
  const random = [...data.games].sort(() => Math.random() - 0.5).slice(0, 12);
  // Top picks (BUY IT)
  const top = data.games.filter(g => (g.rating || '').toLowerCase().replace(/\s+/g, '').includes('buy')).slice(0, 12);
  // With Chinese translations
  const zhPicks = data.games.filter(g => g.title_zh && g.overview_zh).slice(0, 12);

  c.innerHTML = `
    <div class="discover-section">
      <h2>🎲 Today's Random</h2>
      <div class="grid ${state.view==='list'?'list':''}" id="grid-random"></div>
    </div>
    <div class="discover-section">
      <h2>🏆 Top Picks (Buy It)</h2>
      <div class="grid ${state.view==='list'?'list':''}" id="grid-top"></div>
    </div>
    <div class="discover-section">
      <h2>🇹🇼 中文化精選</h2>
      <div class="grid ${state.view==='list'?'list':''}" id="grid-zh"></div>
    </div>
  `;
  random.forEach(g => document.getElementById('grid-random').appendChild(makeCard(g)));
  top.forEach(g => document.getElementById('grid-top').appendChild(makeCard(g)));
  zhPicks.forEach(g => document.getElementById('grid-zh').appendChild(makeCard(g)));
}

/* ============================================================
   SETTINGS VIEW
   ============================================================ */
function renderSettings() {
  const c = document.getElementById('view-container');
  c.innerHTML = `
    <div class="settings-page">
      <h2>⚙ Settings</h2>

      <div class="settings-row">
        <div class="settings-label">Default View 預設顯示
          <small>網格或列表</small>
        </div>
        <div class="settings-control" id="set-view">
          <button data-view="grid" class="${state.view==='grid'?'active':''}">Grid</button>
          <button data-view="list" class="${state.view==='list'?'active':''}">List</button>
        </div>
      </div>

      <div class="settings-row">
        <div class="settings-label">Cache 資料快取
          <small>清除已載入的遊戲資料（包含 IndexedDB 持久化快取，下次載入會重抓）</small>
        </div>
        <div class="settings-control">
          <button class="danger" id="clear-cache">Clear Cache</button>
          <span id="cache-stats" style="margin-left:.6em; opacity:.7; font-size:.85em;"></span>
        </div>
      </div>

      <div class="settings-row">
        <div class="settings-label">About
          <small>Retro Game Dictionary v2.0 — PCE / GBA / FC</small>
        </div>
      </div>
    </div>
  `;
  document.querySelectorAll('#set-view button').forEach(b => {
    b.addEventListener('click', () => {
      state.view = b.dataset.view;
      localStorage.setItem('rgd-view', state.view);
      renderSettings();
    });
  });
  document.getElementById('clear-cache').addEventListener('click', async () => {
    state.cache.clear();
    await idbClear();
    const el = document.getElementById('cache-stats');
    if (el) el.textContent = '已清除';
    setTimeout(() => { if (el) el.textContent = ''; }, 2000);
  });
  // 顯示 IDB 內已快取主機（async）
  (async () => {
    const db = await idbOpen();
    if (!db) return;
    try {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const store = tx.objectStore(IDB_STORE);
      const keysReq = store.getAllKeys();
      keysReq.onsuccess = () => {
        const keys = keysReq.result || [];
        const el = document.getElementById('cache-stats');
        if (el && keys.length) {
          el.textContent = `已快取: ${keys.join(', ')}`;
        }
      };
    } catch (_) {}
  })();
}

/* ============================================================
   ROUTER ENTRY
   ============================================================ */
// Remember scroll position per hash so back-button restores correctly
const _scrollPositions = new Map();
let _prevHash = location.hash;
async function handleRoute() {
  const r = parseRoute();
  // Save scroll for the route we're leaving
  if (_prevHash && _prevHash !== location.hash) {
    _scrollPositions.set(_prevHash, window.scrollY || 0);
  }
  _prevHash = location.hash;
  state.tab = r.tab;
  // Reset console-specific filters (format/genre/region/letter) when switching consoles.
  // Search stays since user may want to find same title across consoles.
  if (r.console && CONSOLE_CONFIG[r.console] && r.console !== state.console) {
    state.filters.format = '';
    state.filters.genre = '';
    state.filters.region = '';
    state.filters.letter = '';
    state.filters.rating = 'all';
  }
  if (r.console && CONSOLE_CONFIG[r.console]) state.console = r.console;

  // Update top bar UI
  document.querySelectorAll('#console-picker .console-pill').forEach(b => {
    b.classList.toggle('active', b.dataset.console === state.console);
  });
  document.querySelectorAll('#tabs-desktop button, #tabbar button').forEach(b => {
    const matchTab = (r.tab === 'detail' ? 'library' : r.tab);
    b.classList.toggle('active', b.dataset.tab === matchTab);
  });

  if (r.tab === 'library') {
    await loadConsole(state.console);
    renderLibrary(state.console);
  } else if (r.tab === 'detail') {
    await renderDetail(state.console, r.id);
  } else if (r.tab === 'discover') {
    renderDiscover();
  } else if (r.tab === 'settings') {
    renderSettings();
  }

  // Scroll restoration: detail/discover/settings always start at top.
  // Library restores prior scroll if user navigated back via browser back button.
  const savedY = _scrollPositions.get(location.hash);
  if (r.tab === 'library' && typeof savedY === 'number') {
    // Defer until grid finishes layout
    requestAnimationFrame(() => requestAnimationFrame(() => window.scrollTo(0, savedY)));
  } else {
    window.scrollTo(0, 0);
  }
}

window.addEventListener('hashchange', handleRoute);

/* ============================================================
   TOP BAR EVENTS
   ============================================================ */
document.querySelectorAll('#console-picker .console-pill').forEach(b => {
  b.addEventListener('click', () => navigate(b.dataset.console));
});
document.querySelectorAll('#tabs-desktop button, #tabbar button').forEach(b => {

    const t = b.dataset.tab;

    else navigate(t);
  });
});

/* ============================================================
   TEXT SIZE TOGGLE  (M=1.0 / L=1.12 default / XL=1.28 / 2XL=1.45)
   ============================================================ */
const TEXT_SIZES = [
  { key: 'M',   scale: 1.00, label: 'M' },
  { key: 'L',   scale: 1.12, label: 'L' },
  { key: 'XL',  scale: 1.28, label: 'XL' },
  { key: '2XL', scale: 1.45, label: '2XL' },
];
function applyTextSize(key) {
  const def = TEXT_SIZES.find(s => s.key === key) || TEXT_SIZES[1];
  document.documentElement.style.setProperty('--text-scale', def.scale);
  document.documentElement.dataset.textSize = def.key;
  localStorage.setItem('rgd-text-size', def.key);
  // Update button label
  const btn = document.getElementById('text-size-btn');
  if (btn) {
    btn.title = `字級：${def.label}（點擊切換）`;
    // Tiny dot indicator: number of dots = level (1..4)
    const idx = TEXT_SIZES.findIndex(s => s.key === def.key);
    const dots = '●'.repeat(idx + 1);
    let dot = btn.querySelector('.level-dot');
    if (!dot) { dot = document.createElement('span'); dot.className = 'level-dot'; btn.appendChild(dot); }
  }
}
function cycleTextSize() {
  const cur = localStorage.getItem('rgd-text-size') || 'L';
  const idx = TEXT_SIZES.findIndex(s => s.key === cur);
  const next = TEXT_SIZES[(idx + 1) % TEXT_SIZES.length];
  applyTextSize(next.key);
}
applyTextSize(localStorage.getItem('rgd-text-size') || 'L');
document.getElementById('text-size-btn').addEventListener('click', cycleTextSize);

/* ============================================================
   SEARCH OVERLAY EVENTS
   ============================================================ */
document.getElementById('search-icon-btn').addEventListener('click', openSearch);
document.getElementById('search-overlay-close').addEventListener('click', closeSearch);
document.getElementById('search-overlay').addEventListener('click', e => {
  if (e.target.id === 'search-overlay') closeSearch();
});
document.getElementById('search-input').addEventListener('input', e => {
  state.filters.search = e.target.value.trim();
  renderSuggestions();
  if (typeof updateSearchPill === 'function') updateSearchPill();
  applyFiltersAndRender();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('search-overlay').classList.contains('show')) {
    closeSearch();
  }
  // Cmd/Ctrl+K to open search
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    openSearch();
  }
});

/* ============================================================
   SCROLL → COLLAPSE CONTROLS
   ============================================================ */
let _scrollTicking = false;
function updateScrollState() {
  const y = window.scrollY || document.documentElement.scrollTop || 0;
  document.body.classList.toggle('scrolled', y > 60);
  _scrollTicking = false;
}
window.addEventListener('scroll', () => {
  if (!_scrollTicking) {
    requestAnimationFrame(updateScrollState);
    _scrollTicking = true;
  }
}, { passive: true });

/* ============================================================
   BOOT
   ============================================================ */
if (!location.hash) location.hash = '#/' + state.console;
handleRoute();
</script>
